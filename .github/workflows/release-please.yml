name: release-please

on:
  workflow_dispatch: {}
  push:
    branches:
      - main
      - 0.3-series

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Create release PR
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v5
        with:
          token: ${{ secrets.HUGRBOT_PAT }}
          target-branch: ${{ github.ref_name }}
